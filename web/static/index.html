<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智保灵犀 - InsurGuide</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; margin: 0; padding: 20px; background: #f5f7fa; }
    .container { max-width: 720px; margin: 0 auto; background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); padding: 24px; }
    h1 { margin: 0 0 8px; color: #1a1a2e; font-size: 1.5rem; }
    .sub { color: #666; font-size: 0.9rem; margin-bottom: 20px; }
    .row { margin-bottom: 12px; }
    label { display: block; margin-bottom: 4px; color: #333; font-weight: 500; }
    input, textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    textarea { min-height: 80px; resize: vertical; }
    button { padding: 10px 20px; background: #2563eb; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    .meta { margin-top: 12px; padding: 12px; background: #f8fafc; border-radius: 8px; font-size: 13px; color: #475569; white-space: pre-wrap; }
    .answer { margin-top: 12px; padding: 12px; background: #ecfdf5; border-radius: 8px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
    .error { color: #dc2626; }
    #apiBase { font-family: monospace; }
  </style>
</head>
<body>
  <div class="container">
    <h1>智保灵犀 · 增强 RAG 对话</h1>
    <p class="sub">InsurGuide PC Web - 多轮对话、意图识别、问题改写、知识库检索</p>
    <div class="row">
      <label for="apiBase">API 地址</label>
      <input type="text" id="apiBase" value="http://localhost:8000" placeholder="http://localhost:8000" />
    </div>
    <div class="row">
      <label for="userId">用户 ID</label>
      <input type="text" id="userId" placeholder="用于多轮上下文的唯一标识" />
    </div>
    <div class="row">
      <label for="query">提问</label>
      <textarea id="query" placeholder="例如：重疾险甲状腺结节核保规则"></textarea>
    </div>
    <div class="row">
      <button type="button" id="send">发送</button>
    </div>
    <div id="meta" class="meta" style="display:none;"></div>
    <div id="answer" class="answer" style="display:none;"></div>
    <div id="err" class="error" style="display:none;"></div>
  </div>
  <script>
    (function () {
      var apiBase = document.getElementById("apiBase");
      var userId = document.getElementById("userId");
      var query = document.getElementById("query");
      var send = document.getElementById("send");
      var metaEl = document.getElementById("meta");
      var answerEl = document.getElementById("answer");
      var errEl = document.getElementById("err");

      function showErr(msg) {
        errEl.textContent = msg;
        errEl.style.display = "block";
        answerEl.style.display = "none";
        metaEl.style.display = "none";
      }
      function showAnswer(meta, answer) {
        errEl.style.display = "none";
        metaEl.textContent = meta;
        metaEl.style.display = "block";
        answerEl.textContent = answer;
        answerEl.style.display = "block";
      }

      send.addEventListener("click", function () {
        var base = (apiBase.value || "").trim().replace(/\/$/, "");
        var uid = (userId.value || "").trim();
        var q = (query.value || "").trim();
        if (!base) { showErr("请填写 API 地址"); return; }
        if (!uid) { showErr("请填写用户 ID"); return; }
        if (!q) { showErr("请填写提问内容"); return; }
        send.disabled = true;
        errEl.style.display = "none";
        fetch(base + "/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ user_id: uid, query: q }),
        })
          .then(function (r) { return r.json(); })
          .then(function (data) {
            send.disabled = false;
            if (data.code !== 200) {
              showErr(data.message || data.detail || "请求失败");
              return;
            }
            var d = data.data || {};
            var meta = "意图：" + (d.intent_cn || "") + "\n来源：" + (d.source && d.source.length ? d.source.join("、") : "无");
            if (d.rewrite_changed && d.rewritten_query) meta += "\n检索用改写：" + d.rewritten_query;
            showAnswer(meta, d.answer || "");
          })
          .catch(function (e) {
            send.disabled = false;
            showErr("请求错误: " + (e.message || String(e)));
          });
      });
    })();
  </script>
</body>
</html>
