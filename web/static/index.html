<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智保灵犀 Agent - InsurGuide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
    <style>
        :root { --gemini-blue: #1a73e8; --dark-bg: #131314; --dark-card: #1e1f20; }
        .dark-mode { background-color: var(--dark-bg) !important; color: #e3e3e3; }
        .dark-mode aside { background-color: var(--dark-card); border-color: #333; }
        .dark-mode main { background-color: var(--dark-bg) !important; }
        .dark-mode #chat-content { background-color: var(--dark-bg) !important; }
        .dark-mode .bg-white { background-color: var(--dark-card) !important; color: #e3e3e3; }
        .dark-mode .bg-gray-100 { background-color: #282a2d !important; }
        .dark-mode .bg-gray-50 { background-color: var(--dark-bg) !important; }
        .dark-mode border { border-color: #444746; }
        .dark-mode .text-gray-500 { color: #9ca3af; }
        .dark-mode .text-gray-800 { color: #e3e3e3; }
        .dark-mode .hover\:bg-gray-100:hover { background-color: #282a2d; }
        .dark-mode .focus-within\:bg-white:focus-within { background-color: var(--dark-card) !important; }
        .dark-mode .focus-within\:border-blue-400:focus-within { border-color: #60a5fa; }
        .dark-mode input, .dark-mode textarea { background-color: transparent; color: #e3e3e3; }
        .animate-slide-up { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .chat-content { scroll-behavior: smooth; }
        /* 案例卡片：圆角、浅蓝背景、引用标记 */
        .case-card { background: #eef6fc; border-left: 4px solid #1a73e8; border-radius: 12px; padding: 1rem 1.25rem; margin: 0.75rem 0; }
        .dark-mode .case-card { background: #1e3a5f; border-left-color: #60a5fa; }
        .ai-answer-content img { max-width: 100%; border-radius: 8px; margin: 0.5rem 0; }
        .ai-answer-content blockquote { border-left: 4px solid #1a73e8; padding-left: 1rem; margin: 0.5rem 0; color: #374151; }
        .ai-answer-content h2 { font-size: 1.125rem; font-weight: 600; margin: 1rem 0 0.5rem; color: #1f2937; }
        .ai-answer-content h3 { font-size: 1rem; font-weight: 600; margin: 0.75rem 0 0.375rem; color: #374151; }
        .ai-answer-content ul, .ai-answer-content ol { margin: 0.5rem 0; padding-left: 1.5rem; }
        .ai-answer-content li { margin: 0.25rem 0; }
        .ai-answer-content table { border-collapse: collapse; width: 100%; margin: 0.75rem 0; font-size: 0.875rem; min-width: 280px; }
        .ai-answer-content { overflow-wrap: break-word; word-break: break-word; }
        .ai-answer-content th, .ai-answer-content td { border: 1px solid #e5e7eb; padding: 0.5rem 0.75rem; text-align: left; }
        .ai-answer-content th { background: #f3f4f6; font-weight: 600; }
        .ai-answer-content tr:nth-child(even) { background: #f9fafb; }
        .dark-mode .ai-answer-content h2, .dark-mode .ai-answer-content h3 { color: #e5e7eb; }
        .dark-mode .ai-answer-content th, .dark-mode .ai-answer-content td { border-color: #374151; }
        .dark-mode .ai-answer-content th { background: #374151; }
        .dark-mode .ai-answer-content tr:nth-child(even) { background: #1f2937; }
    </style>
</head>
<body class="bg-gray-50 transition-colors duration-300 font-sans">
    <!-- 认证页：登录 / 注册 -->
    <div id="auth-page" class="flex items-center justify-center min-h-screen relative z-50 bg-inherit px-4">
        <div class="bg-white p-6 sm:p-10 rounded-3xl shadow-2xl w-full max-w-md border border-gray-100 text-center dark:bg-[var(--dark-card)] dark:border-gray-600">
            <h2 class="text-2xl sm:text-3xl font-bold text-blue-600 mb-2">智保灵犀</h2>
            <p class="text-gray-500 dark:text-gray-400 mb-6">开启您的 AI 保险专家之旅</p>
            <div id="auth-tabs" class="flex gap-4 justify-center mb-6">
                <button type="button" id="tab-login" class="px-4 py-2 rounded-xl font-medium bg-blue-100 text-blue-600 dark:bg-blue-900/40 dark:text-blue-300">登录</button>
                <button type="button" id="tab-register" class="px-4 py-2 rounded-xl font-medium text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700">注册</button>
            </div>
            <!-- 登录表单 -->
            <form id="form-login" class="space-y-4">
                <input type="text" id="login-username" placeholder="用户名" required class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all dark:bg-gray-800 dark:border-gray-600 dark:placeholder-gray-400" />
                <input type="password" id="login-password" placeholder="密码" required class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all dark:bg-gray-800 dark:border-gray-600" />
                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all">登录</button>
            </form>
            <!-- 注册表单 -->
            <form id="form-register" class="space-y-4 hidden">
                <input type="text" id="reg-username" placeholder="用户名" required class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all dark:bg-gray-800 dark:border-gray-600" />
                <input type="email" id="reg-email" placeholder="电子邮箱" required class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all dark:bg-gray-800 dark:border-gray-600" />
                <input type="password" id="reg-password" placeholder="设置密码" required class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all dark:bg-gray-800 dark:border-gray-600" />
                <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all">注册</button>
            </form>
            <p id="auth-msg" class="mt-4 text-sm text-red-500 min-h-5"></p>
            <p class="mt-6 text-sm text-gray-400">使用即表示同意服务协议</p>
        </div>
    </div>

    <!-- 主应用 -->
    <div id="main-app" class="hidden flex h-screen overflow-hidden">
        <!-- 遮罩层：小屏侧栏展开时显示，点击关闭 -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/40 z-30 hidden lg:hidden" aria-hidden="true"></div>
        <aside id="sidebar" class="w-64 shrink-0 border-r border-gray-200 flex flex-col bg-white dark:bg-[var(--dark-card)] dark:border-gray-700 fixed lg:relative inset-y-0 left-0 z-40 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-out">
            <div class="p-4">
                <button type="button" id="btn-new-chat" class="w-full flex items-center justify-center gap-2 py-3 bg-blue-50 text-blue-600 rounded-2xl font-semibold hover:bg-blue-100 dark:bg-blue-900/40 dark:hover:bg-blue-900/60">+ 新对话</button>
            </div>
            <div class="flex-1 px-4 space-y-2 overflow-y-auto no-scrollbar">
                <p class="text-[11px] font-bold text-gray-400 uppercase mt-4 mb-2 px-2">最近记录</p>
                <div id="history-list" class="space-y-1">
                    <div class="p-3 text-sm text-gray-500 dark:text-gray-400">暂无记录</div>
                </div>
            </div>
            <div class="p-4 border-t border-gray-200 dark:border-gray-700 space-y-2">
                <button type="button" id="btn-theme" class="w-full text-left p-3 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-xl text-sm flex items-center gap-3">
                    <span id="t-icon">🌙</span> <span id="t-text">黑夜模式</span>
                </button>
                <div class="flex items-center gap-3 p-2 bg-gray-50 rounded-2xl dark:bg-gray-800">
                    <div id="user-avatar" class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold shrink-0">U</div>
                    <div class="text-xs truncate font-medium dark:text-gray-300" id="user-display">-</div>
                    <button type="button" id="btn-logout" class="ml-auto text-gray-400 hover:text-red-500 text-xs">退出</button>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative min-w-0 overflow-x-hidden">
            <header class="p-4 flex items-center gap-3 shrink-0 border-b border-gray-200 dark:border-gray-700">
                <button type="button" id="btn-toggle-sidebar" class="lg:hidden flex items-center justify-center w-11 h-11 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition" title="菜单" aria-label="打开菜单">☰</button>
                <select id="model-select" class="flex-1 sm:flex-none bg-transparent font-bold text-base sm:text-xl outline-none cursor-pointer border-none hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg p-1 min-w-0">
                    <option value="pro">智保灵犀 - 专业版</option>
                    <option value="standard">智保灵犀 - 标准版</option>
                </select>
            </header>

            <div id="chat-content" class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-8 flex flex-col items-center no-scrollbar chat-content">
                <div id="welcome-ui" class="text-center mt-16 sm:mt-24 lg:mt-32 animate-slide-up px-4">
                    <h1 class="text-3xl sm:text-4xl lg:text-5xl font-bold mb-6 bg-gradient-to-r from-blue-600 via-indigo-500 to-purple-500 bg-clip-text text-transparent">您好，我是智保灵犀</h1>
                    <p class="text-gray-500 dark:text-gray-400 text-base sm:text-lg">上传保险单据，为您提供精准的条款解析与保障建议</p>
                </div>
            </div>

            <div class="p-4 sm:p-6 max-w-4xl mx-auto w-full shrink-0">
                <div id="input-area" class="bg-gray-100 dark:bg-gray-800 rounded-[32px] p-3 sm:p-4 transition-all border-2 border-transparent focus-within:bg-white focus-within:border-blue-400 focus-within:shadow-xl dark:focus-within:bg-gray-800">
                    <div id="file-preview-box" class="hidden flex items-center gap-2 bg-white dark:bg-gray-700 w-max px-3 py-2 rounded-2xl mb-3 shadow-sm border border-blue-100 dark:border-gray-600 animate-slide-up">
                        <span class="text-blue-500 font-bold">DOC</span>
                        <span id="fn" class="text-xs font-medium text-gray-600 dark:text-gray-300"></span>
                        <button type="button" id="btn-cancel-file" class="text-gray-400 hover:text-red-500 font-bold ml-1">×</button>
                    </div>
                    <textarea id="main-input" rows="1" placeholder="在此输入保险咨询问题..." class="w-full bg-transparent outline-none resize-none px-2 text-lg dark:placeholder-gray-400"></textarea>
                    <div class="flex justify-between items-center mt-4">
                        <div class="flex gap-2">
                            <input type="file" id="f-upload" class="hidden" accept=".pdf,.doc,.docx,.txt" />
                            <button type="button" id="btn-upload" class="p-3 hover:bg-gray-200 dark:hover:bg-gray-600 rounded-full transition text-xl" title="上传附件">📎</button>
                        </div>
                        <button type="button" id="btn-send" class="bg-blue-600 text-white px-6 py-3 sm:px-8 sm:py-2.5 rounded-full font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-100 dark:shadow-none min-h-[44px]">发送</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        (function () {
            const API_BASE = (function () {
                var o = window.location.origin || '';
                if (!o || o === 'null' || o === 'file://') return 'http://localhost:8000';
                return o.replace(/\/$/, '');
            })();

            const TOKEN_KEY = 'insurguide_token';
            const THEME_KEY = 'insurguide_theme';

            let currentUser = null;

            function getToken() { return localStorage.getItem(TOKEN_KEY); }
            function setToken(t) { if (t) localStorage.setItem(TOKEN_KEY, t); else localStorage.removeItem(TOKEN_KEY); }

            function showAuthPage() {
                document.getElementById('auth-page').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
            function showMainApp() {
                document.getElementById('auth-page').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
            }
            function setAuthMsg(msg, isError) {
                const el = document.getElementById('auth-msg');
                el.textContent = msg || '';
                el.className = 'mt-4 text-sm min-h-5 ' + (isError ? 'text-red-500' : 'text-green-600');
            }

            // 主题
            function applyTheme(isDark) {
                if (isDark) document.body.classList.add('dark-mode');
                else document.body.classList.remove('dark-mode');
                document.getElementById('t-text').textContent = isDark ? '白天模式' : '黑夜模式';
                document.getElementById('t-icon').textContent = isDark ? '☀️' : '🌙';
            }
            function toggleTheme() {
                const isDark = document.body.classList.toggle('dark-mode');
                localStorage.setItem(THEME_KEY, isDark ? 'dark' : 'light');
                document.getElementById('t-text').textContent = isDark ? '白天模式' : '黑夜模式';
                document.getElementById('t-icon').textContent = isDark ? '☀️' : '🌙';
            }
            if (localStorage.getItem(THEME_KEY) === 'dark') applyTheme(true);

            document.getElementById('btn-theme').addEventListener('click', toggleTheme);

            document.getElementById('btn-toggle-sidebar')?.addEventListener('click', toggleSidebar);
            document.getElementById('sidebar-overlay')?.addEventListener('click', closeSidebar);
            window.addEventListener('resize', syncSidebarForViewport);

            // 认证 Tab
            document.getElementById('tab-login').addEventListener('click', function () {
                document.getElementById('form-login').classList.remove('hidden');
                document.getElementById('form-register').classList.add('hidden');
                document.getElementById('tab-login').classList.add('bg-blue-100', 'text-blue-600');
                document.getElementById('tab-login').classList.remove('text-gray-500');
                document.getElementById('tab-register').classList.remove('bg-blue-100', 'text-blue-600');
                document.getElementById('tab-register').classList.add('text-gray-500');
                setAuthMsg('');
            });
            document.getElementById('tab-register').addEventListener('click', function () {
                document.getElementById('form-register').classList.remove('hidden');
                document.getElementById('form-login').classList.add('hidden');
                document.getElementById('tab-register').classList.add('bg-blue-100', 'text-blue-600');
                document.getElementById('tab-register').classList.remove('text-gray-500');
                document.getElementById('tab-login').classList.remove('bg-blue-100', 'text-blue-600');
                document.getElementById('tab-login').classList.add('text-gray-500');
                setAuthMsg('');
            });

            // 登录
            document.getElementById('form-login').addEventListener('submit', async function (e) {
                e.preventDefault();
                const username = document.getElementById('login-username').value.trim();
                const password = document.getElementById('login-password').value;
                if (!username || !password) { setAuthMsg('请填写用户名和密码', true); return; }
                setAuthMsg('登录中…');
                try {
                    const form = new FormData();
                    form.append('username', username);
                    form.append('password', password);
                    const r = await fetch(API_BASE + '/api/auth/login', {
                        method: 'POST',
                        body: form,
                        headers: { 'Accept': 'application/json' }
                    });
                    const data = await r.json();
                    if (r.status !== 200) {
                        setAuthMsg(data.detail || data.message || '登录失败', true);
                        return;
                    }
                    setToken(data.access_token);
                    setAuthMsg('登录成功', false);
                    await loadMeAndEnter();
                } catch (err) {
                    setAuthMsg('请求错误: ' + (err.message || String(err)), true);
                }
            });

            // 注册
            document.getElementById('form-register').addEventListener('submit', async function (e) {
                e.preventDefault();
                const username = document.getElementById('reg-username').value.trim();
                const email = document.getElementById('reg-email').value.trim();
                const password = document.getElementById('reg-password').value;
                if (!username || !email || !password) { setAuthMsg('请填写完整信息', true); return; }
                setAuthMsg('注册中…');
                try {
                    const r = await fetch(API_BASE + '/api/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, email, password })
                    });
                    const data = await r.json();
                    if (r.status === 201) {
                        setAuthMsg('注册成功，请登录', false);
                        document.getElementById('tab-login').click();
                        document.getElementById('login-username').value = username;
                        return;
                    }
                    var detail = data.detail;
                    var msg = typeof detail === 'string' ? detail : (Array.isArray(detail) && detail[0] && detail[0].msg) ? detail[0].msg : data.message || '注册失败';
                    setAuthMsg(msg, true);
                } catch (err) {
                    setAuthMsg('请求错误: ' + (err.message || String(err)), true);
                }
            });

            async function loadMeAndEnter() {
                const token = getToken();
                if (!token) { showAuthPage(); return; }
                try {
                    const r = await fetch(API_BASE + '/api/auth/me', {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    if (r.status !== 200) {
                        setToken(null);
                        showAuthPage();
                        return;
                    }
                    currentUser = await r.json();
                    document.getElementById('user-display').textContent = currentUser.email || currentUser.username || '-';
                    document.getElementById('user-avatar').textContent = (currentUser.username || 'U').charAt(0).toUpperCase();
                    showMainApp();
                    clearChatUI();
                    loadHistory();
                } catch (_) {
                    setToken(null);
                    showAuthPage();
                }
            }

            document.getElementById('btn-logout').addEventListener('click', function () {
                setToken(null);
                currentUser = null;
                showAuthPage();
            });

            // 新对话
            document.getElementById('btn-new-chat').addEventListener('click', async function () {
                if (!currentUser) return;
                closeSidebar();
                try {
                    await fetch(API_BASE + '/api/chat/clear', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: currentUser.username })
                    });
                } catch (_) {}
                clearChatUI();
            });

            function clearChatUI() {
                const box = document.getElementById('chat-content');
                const welcome = document.getElementById('welcome-ui');
                welcome.classList.remove('hidden');
                const others = box.querySelectorAll('.chat-msg');
                others.forEach(function (el) { el.remove(); });
            }

            // 最近记录：拉取并渲染最近 5 条对话标题
            async function loadHistory() {
                const listEl = document.getElementById('history-list');
                if (!listEl) return;
                const token = getToken();
                if (!token) {
                    listEl.innerHTML = '<div class="p-3 text-sm text-gray-500 dark:text-gray-400">暂无记录</div>';
                    return;
                }
                try {
                    const r = await fetch(API_BASE + '/api/chat/history?limit=5', {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    const res = await r.json();
                    if (r.status !== 200 || res.code !== 200 || !Array.isArray(res.data)) {
                        listEl.innerHTML = '<div class="p-3 text-sm text-gray-500 dark:text-gray-400">暂无记录</div>';
                        return;
                    }
                    if (res.data.length === 0) {
                        listEl.innerHTML = '<div class="p-3 text-sm text-gray-500 dark:text-gray-400">暂无记录</div>';
                        return;
                    }
                    listEl.innerHTML = res.data.map(function (item) {
                        return '<div class="history-item p-3 text-sm hover:bg-gray-100 dark:hover:bg-gray-700 rounded-xl cursor-pointer truncate" data-log-id="' + escapeHtml(String(item.id)) + '" title="' + escapeHtml(item.title || '') + '">' + escapeHtml(item.title || '（无标题）') + '</div>';
                    }).join('');
                } catch (_) {
                    listEl.innerHTML = '<div class="p-3 text-sm text-gray-500 dark:text-gray-400">暂无记录</div>';
                }
            }

            // 点击最近记录：拉取该条问+答并展示，同时恢复上下文以便继续对话
            document.getElementById('history-list').addEventListener('click', async function (e) {
                var el = e.target;
                while (el && el !== this) {
                    if (el.classList && el.classList.contains('history-item')) {
                        var logId = el.getAttribute('data-log-id');
                        if (!logId || !currentUser) return;
                        var token = getToken();
                        if (!token) return;
                        try {
                            var r = await fetch(API_BASE + '/api/chat/history/' + logId, {
                                headers: { 'Authorization': 'Bearer ' + token }
                            });
                            if (r.status !== 200) return;
                            var res = await r.json();
                            if (res.code !== 200 || !res.data) return;
                            var d = res.data;
                            clearChatUI();
                            document.getElementById('welcome-ui').classList.add('hidden');
                            var box = document.getElementById('chat-content');
                            closeSidebar();
                            var userHtml = '<div class="w-full max-w-[95%] sm:max-w-3xl flex flex-col items-end animate-slide-up chat-msg">' +
                                '<div class="bg-blue-600 text-white p-4 sm:p-5 rounded-3xl rounded-tr-none shadow-md">' + nl2br(d.query || '') + '</div></div>';
                            var aiHtml = '<div class="w-full max-w-[95%] sm:max-w-3xl flex gap-3 sm:gap-4 animate-slide-up chat-msg">' +
                                '<div class="w-10 h-10 bg-blue-100 dark:bg-blue-900/50 text-blue-600 dark:text-blue-300 rounded-full flex items-center justify-center font-bold shadow-sm shrink-0">灵</div>' +
                                '<div class="bg-white dark:bg-gray-800 border dark:border-gray-600 p-4 sm:p-6 rounded-3xl rounded-tl-none shadow-sm text-gray-800 dark:text-gray-200 leading-relaxed ai-answer-content">' + renderAnswer(d.answer || '') + '</div></div>';
                            box.insertAdjacentHTML('beforeend', userHtml + aiHtml);
                            scrollToBottom();
                            await fetch(API_BASE + '/api/chat/context/restore', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                                body: JSON.stringify({ log_id: parseInt(logId, 10) })
                            });
                        } catch (_) {}
                        return;
                    }
                    el = el.parentElement;
                }
            });

            // 文件
            document.getElementById('btn-upload').addEventListener('click', function () { document.getElementById('f-upload').click(); });
            document.getElementById('f-upload').addEventListener('change', function () {
                if (this.files.length > 0) {
                    document.getElementById('fn').textContent = this.files[0].name;
                    document.getElementById('file-preview-box').classList.remove('hidden');
                }
            });
            document.getElementById('btn-cancel-file').addEventListener('click', function () {
                document.getElementById('f-upload').value = '';
                document.getElementById('file-preview-box').classList.add('hidden');
            });

            function cancelFile() {
                document.getElementById('f-upload').value = '';
                document.getElementById('file-preview-box').classList.add('hidden');
            }

            // 发送 & 对话
            function scrollToBottom() {
                const box = document.getElementById('chat-content');
                box.scrollTop = box.scrollHeight;
            }

            function escapeHtml(s) {
                const div = document.createElement('div');
                div.textContent = s;
                return div.innerHTML;
            }

            function nl2br(s) {
                return escapeHtml(s || '').replace(/\n/g, '<br>');
            }

            function renderAnswer(rawAnswer) {
                if (!rawAnswer || !String(rawAnswer).trim()) return '';
                var text = String(rawAnswer).trim();
                if (typeof marked === 'undefined') return nl2br(text);
                try {
                    marked.setOptions({ breaks: true });
                    var html = marked.parse(text);
                    html = html.replace(/<blockquote>/g, '<blockquote class="case-card">');
                    html = html.replace(/<table>/g, '<div class="overflow-x-auto rounded-lg my-2"><table>').replace(/<\/table>/g, '</table></div>');
                    return html;
                } catch (e) {
                    return nl2br(text);
                }
            }

            function closeSidebar() {
                var sidebar = document.getElementById('sidebar');
                var overlay = document.getElementById('sidebar-overlay');
                if (sidebar) sidebar.classList.add('-translate-x-full');
                if (sidebar) sidebar.classList.remove('translate-x-0');
                if (overlay) overlay.classList.add('hidden');
            }
            function openSidebar() {
                var sidebar = document.getElementById('sidebar');
                var overlay = document.getElementById('sidebar-overlay');
                if (sidebar) sidebar.classList.remove('-translate-x-full');
                if (sidebar) sidebar.classList.add('translate-x-0');
                if (overlay) overlay.classList.remove('hidden');
            }
            function toggleSidebar() {
                var sidebar = document.getElementById('sidebar');
                if (!sidebar) return;
                var isOpen = sidebar.classList.contains('translate-x-0');
                if (isOpen) closeSidebar();
                else openSidebar();
            }
            function syncSidebarForViewport() {
                if (window.matchMedia('(min-width: 1024px)').matches) {
                    document.getElementById('sidebar-overlay')?.classList.add('hidden');
                } else closeSidebar();
            }

            document.getElementById('btn-send').addEventListener('click', handleSend);
            document.getElementById('main-input').addEventListener('keydown', function (e) {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
            });

            async function handleSend() {
                const input = document.getElementById('main-input');
                const box = document.getElementById('chat-content');
                const fileBox = document.getElementById('file-preview-box');
                const text = (input.value || '').trim();
                const hasFile = !fileBox.classList.contains('hidden');
                if (!text && !hasFile) return;
                if (!currentUser) return;

                document.getElementById('welcome-ui').classList.add('hidden');

                const fileName = hasFile ? document.getElementById('fn').textContent : '';
                const userHtml = '<div class="w-full max-w-[95%] sm:max-w-3xl flex flex-col items-end animate-slide-up chat-msg">' +
                    '<div class="bg-blue-600 text-white p-4 sm:p-5 rounded-3xl rounded-tr-none shadow-md">' +
                    (hasFile ? '<div class="text-[10px] bg-blue-700 p-2 rounded-lg mb-2">已上传文件：' + escapeHtml(fileName) + '</div>' : '') +
                    nl2br(text || '（仅上传文件）') +
                    '</div></div>';
                box.insertAdjacentHTML('beforeend', userHtml);
                const queryToSend = text || '请根据我上传的文件做条款解析与保障建议';
                input.value = '';
                cancelFile();
                scrollToBottom();

                const placeholderId = 'ai-msg-' + Date.now();
                const placeholderHtml = '<div id="' + placeholderId + '" class="w-full max-w-[95%] sm:max-w-3xl flex gap-3 sm:gap-4 animate-slide-up chat-msg">' +
                    '<div class="w-10 h-10 bg-blue-100 dark:bg-blue-900/50 text-blue-600 dark:text-blue-300 rounded-full flex items-center justify-center font-bold shadow-sm shrink-0">灵</div>' +
                    '<div class="bg-white dark:bg-gray-800 border dark:border-gray-600 p-4 sm:p-6 rounded-3xl rounded-tl-none shadow-sm text-gray-800 dark:text-gray-200 leading-relaxed">思考中…</div></div>';
                box.insertAdjacentHTML('beforeend', placeholderHtml);
                scrollToBottom();

                try {
                    var modelPlan = (document.getElementById('model-select').value || 'standard').trim();
                    const r = await fetch(API_BASE + '/api/chat/stream', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: currentUser.username, query: queryToSend, model_plan: modelPlan })
                    });
                    const container = document.getElementById(placeholderId);
                    if (!container) return;
                    const contentDiv = container.querySelector('div:last-child');
                    if (!r.ok) {
                        contentDiv.innerHTML = '请求失败：' + escapeHtml(String(r.status));
                        contentDiv.classList.add('text-red-500');
                        scrollToBottom();
                        return;
                    }
                    var fullText = '';
                    function processEvent(event) {
                        if (event.type === 'chunk' && event.content) {
                            fullText += event.content;
                            contentDiv.textContent = fullText;
                            scrollToBottom();
                        } else if (event.type === 'done') {
                            var rawAnswer = event.answer || fullText;
                            var html = renderAnswer(rawAnswer);
                            contentDiv.classList.add('ai-answer-content');
                            if (event.source && event.source.length) {
                                html += '<div class="mt-4 pt-3 border-t border-gray-200 dark:border-gray-600 text-xs text-gray-500 dark:text-gray-400">来源：' + escapeHtml(event.source.join('、')) + '</div>';
                            }
                            if (event.intent_cn) {
                                html += '<div class="mt-1 text-xs text-gray-500 dark:text-gray-400">意图：' + escapeHtml(event.intent_cn) + '</div>';
                            }
                            if (event.state === 'GUIDING') {
                                html += '<div class="mt-2 text-xs text-blue-600 dark:text-blue-400">💬 正在引导补全信息</div>';
                            }
                            contentDiv.innerHTML = html;
                            loadHistory();
                        } else if (event.type === 'error') {
                            contentDiv.textContent = '错误：' + escapeHtml(event.message || '未知错误');
                            contentDiv.classList.add('text-red-500');
                        }
                    }
                    var buffer = '';
                    const reader = r.body.getReader();
                    const decoder = new TextDecoder();
                    while (true) {
                        var res = await reader.read();
                        if (res.done) break;
                        buffer += decoder.decode(res.value, { stream: true });
                        var parts = buffer.split('\n\n');
                        buffer = parts.pop() || '';
                        for (var i = 0; i < parts.length; i++) {
                            var line = parts[i];
                            if (!line || !line.startsWith('data: ')) continue;
                            try {
                                processEvent(JSON.parse(line.slice(6)));
                            } catch (_) {}
                        }
                    }
                    if (buffer.trim() && buffer.trim().startsWith('data: ')) {
                        try {
                            processEvent(JSON.parse(buffer.trim().slice(6)));
                        } catch (_) {}
                    }
                } catch (err) {
                    var container = document.getElementById(placeholderId);
                    if (container) {
                        var contentDiv = container.querySelector('div:last-child');
                        contentDiv.innerHTML = '请求错误：' + escapeHtml(err.message || String(err));
                        contentDiv.classList.add('text-red-500');
                    }
                }
                scrollToBottom();
            }

            // textarea 自动增高
            document.getElementById('main-input').addEventListener('input', function () {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 200) + 'px';
            });

            // 初始化
            if (getToken()) loadMeAndEnter();
            else showAuthPage();
        })();
    </script>
</body>
</html>
